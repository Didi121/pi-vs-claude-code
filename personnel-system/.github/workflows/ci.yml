name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: personnel-system/backend/package-lock.json
      - run: cd personnel-system/backend && npm ci
      - run: cd personnel-system/backend && npm run lint
      - run: cd personnel-system/backend && npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: personnel-system/frontend/package-lock.json
      - run: cd personnel-system/frontend && npm ci
      - run: cd personnel-system/frontend && npm run build --if-present
      - run: cd personnel-system/frontend && npm test -- --passWithNoTests